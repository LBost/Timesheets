<div hlmSidebarWrapper class="min-h-dvh">
  <app-shell-sidebar-nav [sections]="navSections" [footerItems]="navFooterItems" />

  <main hlmSidebarInset class="min-h-dvh">
    <app-shell-top-header
      [themeIconName]="themeIconName()"
      [themeToggleAriaLabel]="themeToggleAriaLabel()"
      [currentUserEmail]="auth.currentUserEmail()"
      (themeToggle)="theme.cycleMode()"
      (signOut)="handleSignOut()"
    />

    <section class="flex min-h-0 flex-1 flex-col bg-background">
      <div class="flex-1 p-4 text-foreground">
        <router-outlet />
      </div>
      <app-shell-toast [message]="toast.current()" />
      <app-shell-app-footer [year]="2026" statusText="Single-user desktop mode" />
    </section>
  </main>
</div>
